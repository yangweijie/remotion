## 常见问题

**Q: 歌词显示乱码？**
- 确保使用支持中文的TTF字体
- 默认使用 `/Library/Fonts/WenQuanWeiMiHei-1.ttf`
- 可指定 `--font` 参数使用其他字体

**Q: 歌词超出画面？**
- 脚本会自动调整字体大小
- 超长歌词会智能换行
- 支持2-3行歌词显示

**Q: GIF文件太大？**
- 降低分辨率：--width=480 --height=270
- 降低帧率：--fps=5
- 使用流式编码（已默认优化）

**Q: 视频生成失败？**
- 确保安装了FFmpeg
- 检查音频文件格式（推荐MP3）
- 查看output目录权限

