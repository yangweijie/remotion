## LRC歌词格式

支持标准LRC格式：

```
[ti:歌曲名]
[ar:歌手]
[00:16.54]散场时能否留下来
[00:18.00]角落里的红裙姑娘
[00:25.25]我会为你点杯高大师啤酒
```

**自动过滤：**
- 元数据标签（[ti:], [ar:]等）
- 作词、作曲、编曲等 credits

