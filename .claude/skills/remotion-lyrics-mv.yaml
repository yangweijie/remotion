## 视频帧分析流程

### 1. 提取参考帧

```bash
ffmpeg -i "参考视频.mp4" -ss 00:00:01 -vframes 1 frame1.jpg
ffmpeg -i "参考视频.mp4" -ss 00:01:30 -vframes 1 frame2.jpg
ffmpeg -i "参考视频.mp4" -ss 00:03:00 -vframes 1 frame3.jpg
```

### 2. 使用提示词分析

读取 `prompts/quick-analysis-prompt.md`，将提示词内容与帧图片一起发送给AI。

### 3. 应用分析结果

AI会输出YAML格式配置：

```yaml
风格: 复古怀旧
主色调: 暖橙色(#FF8C42)
背景处理: 中度模糊(5-8px) + 暗角遮罩
字幕: 底部居中 | 红色(#C00000) | 投影阴影
字体建议: 36-48px
```

