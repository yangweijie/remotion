name: remotion-render
description: 渲染 PHP Remotion 动画为 GIF 文件，支持内存优化渲染
triggers:
  - "渲染动画"
  - "render animation"
  - "生成 gif"
  - "渲染示例"
parameters:
  - name: compositionId
    type: string
    required: true
    description: 合成 ID (fade-text, spring-scale, multi-sequence, rainbow-animation, pulse-effect, typewriter, progress-bar, slideshow)
    default: spring-scale
  - name: outputFile
    type: string
    required: false
    description: 输出文件名
    default: "{compositionId}.gif"
  - name: mode
    type: string
    required: false
    description: 渲染模式 (standard, streaming, optimized)
    default: streaming
examples:
  - "渲染 spring-scale 动画"
  - "生成 fade-text.gif"
  - "渲染 progress-bar 示例"
  - "用流式模式渲染"
notes: |
  渲染模式说明:
  - standard: 标准渲染，适合短视频 <60帧
  - streaming: 流式编码，内存节省 92%，推荐长视频
  - optimized: gifsicle 压缩，最小文件体积
  
  内存对比 (300帧 1080p):
  - standard: 741 MB
  - streaming: 57.8 MB
  - optimized: 49 MB
command: "php example.php {compositionId} {outputFile}"
workingDirectory: "{{workspace}}"
