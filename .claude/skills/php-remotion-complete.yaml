## 缓动函数参考

```php
use Yangweijie\Remotion\Animation\Easing;

// 基础缓动
Easing::linear($t);
Easing::ease($t);
Easing::easeIn($t);
Easing::easeOut($t);
Easing::easeInOut($t);

// 数学缓动
Easing::quad($t);
Easing::cubic($t);
Easing::sin($t);
Easing::circle($t);
Easing::exp($t);

// 弹性效果
Easing::bounce($t);
$elastic = Easing::elastic(1.0);
$back = Easing::back(1.70158);

// 贝塞尔曲线
$bezier = Easing::bezier(0.25, 0.1, 0.25, 1.0);
```

