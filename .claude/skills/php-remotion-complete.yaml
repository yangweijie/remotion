```bash
# 增加 PHP 内存限制
php -d memory_limit=512M example.php fade-text
```

**Q: 中文字符显示为方块**
```bash
# 需要使用支持中文的 TTF 字体
# 修改 TextLayer 使用 imagettftext 替代 imagestring
```

**Q: GIF 文件过大**
```bash
# 降低帧率或减少颜色数
# 在 Renderer 中调整质量参数
```

