# PHP Remotion 开发技能

## 项目简介

PHP Remotion 是将 JavaScript Remotion 核心概念移植到 PHP 的程序化视频/动画合成库。使用纯 PHP 代码创建 GIF 动画。

**核心能力:**
- 程序化动画合成
- GIF 渲染输出（内存优化 92%+）
- 时间序列管理
- 数值/颜色插值
- 物理弹簧动画
- 丰富的缓动函数
- Grafika 图像处理支持

