## 开发工作流

### 1. 创建新动画

```php
// 在 example.php 中添加
$newComp = Remotion::composition(
    id: 'my-new-animation',
    renderer: function (RenderContext $ctx): \GdImage {
        $frame = $ctx->getCurrentFrame();
        $config = $ctx->getVideoConfig();
        
        $canvas = Remotion::createCanvas($config->width, $config->height, [20, 20, 50]);
        
        // 你的动画逻辑
        
        return $canvas;
    },
    durationInFrames: 60,
    fps: 30,
    width: 640,
    height: 360,
);
```

### 2. 注册合成

```php
Remotion::registerRoot([$newComp]);
```

### 3. 渲染测试

```bash
php example.php my-new-animation
```

