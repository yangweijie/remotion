name: remotion-test
description: 运行 PHP Remotion 项目测试（123 个测试，278 个断言）
triggers:
  - "运行测试"
  - "run tests"
  - "pest 测试"
  - "单元测试"
parameters:
  - name: filter
    type: string
    required: false
    description: 测试过滤条件（可选）
    default: ""
  - name: group
    type: string
    required: false
    description: 测试分组
    default: ""
examples:
  - "运行所有测试"
  - "测试 Easing 模块"
  - "运行 spring 相关测试"
command: "./vendor/bin/pest{filter}{group}"
workingDirectory: "{{workspace}}"
testCommand: "./vendor/bin/pest --filter '{filter}'" 
testGroupCommand: "./vendor/bin/pest --group {group}"
availableGroups:
  - easing
  - interpolate
  - spring
  - color
  - video-config
  - render-context
  - sequence
  - grafika-layers
  - gif-optimization
  - streaming-gif
